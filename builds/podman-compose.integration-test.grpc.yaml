services:
  postgres-template:
    build:
      context: ..
      dockerfile: ./builds/database.Dockerfile
    networks:
      - template-integration-grpc-test
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256

  service-template:
    build:
      context: ..
      dockerfile: ./builds/standalone.grpc.Dockerfile
    ports:
      - "${GRPC_PORT}:8080"
    depends_on:
      - postgres-template
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-template:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - template-integration-grpc-test

networks:
  template-integration-grpc-test:
