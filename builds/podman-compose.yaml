services:
  postgres-template:
    build:
      context: ..
      dockerfile: ./builds/database.Dockerfile
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - api
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - template-postgres-data:/var/lib/postgresql/

  service-template-grpc:
    build:
      context: ..
      dockerfile: ./builds/standalone.grpc.Dockerfile
    ports:
      - "${GRPC_PORT}:8080"
    depends_on:
      - postgres-template
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres-template:5432/template?sslmode=disable
    networks:
      - api

  service-template-rest:
    build:
      context: ..
      dockerfile: ./builds/standalone.rest.Dockerfile
    ports:
      - "${REST_PORT}:8080"
    depends_on:
      - postgres-template
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres-template:5432/template?sslmode=disable
    networks:
      - api

networks:
  api:

volumes:
  template-postgres-data:
